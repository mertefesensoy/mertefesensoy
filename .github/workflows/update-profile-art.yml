name: Refresh profile telemetry

"on":
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: profile-telemetry
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch public contribution data
        run: python scripts/fetch_contributions.py

      - name: Render IBM contribution console
        run: python scripts/render_heatmap_svg.py

      - name: Update accessible activity summary
        run: python scripts/update_readme_stats.py

      - name: Run profile checks
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_profile.py
          git diff --check

      - name: Commit refreshed telemetry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg README.md
          if git diff --cached --quiet; then
            echo "Profile telemetry is already current."
            exit 0
          fi
          git commit -m "chore: refresh profile telemetry"
          git push
